<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Random Fits</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <a class="logo" href="index.html">Random Fits</a>

    <nav class="nav">
      <a href="index.html#shop">Shop</a>
      <a href="index.html#about">About</a>
      <a href="account.html">Account</a>
    </nav>

    <div class="header-actions">
      <button class="login-button" id="customerAuthButton">Sign in</button>
      <a class="bag-button" href="index.html">Back</a>
    </div>
  </header>

  <main class="checkout-page">
    <section class="checkout-card">
      <p class="tag">Checkout</p>
      <h1>Shipping details</h1>

      <form id="checkoutForm" class="checkout-form">
        <div class="form-grid">
          <label>First Name<input type="text" id="firstName" name="firstName" autocomplete="given-name" required></label>
          <label>Last Name<input type="text" id="lastName" name="lastName" autocomplete="family-name" required></label>
        </div>

        <label>Email<input type="email" id="email" name="email" autocomplete="email" required></label>
        <label>Phone<input type="tel" id="phone" name="phone" autocomplete="tel" required></label>
        <label class="address-field">Address
          <input type="text" id="address" name="address" autocomplete="street-address" placeholder="Example: 307 guildford" required>
          <div id="addressSuggestions" class="address-suggestions"></div>
        </label>

        <div class="form-grid three">
          <label>City<input type="text" id="city" name="city" autocomplete="address-level2" required></label>
          <label>State<input type="text" id="state" name="state" autocomplete="address-level1" maxlength="2" placeholder="NY" required></label>
          <label>ZIP<input type="text" id="zip" name="zip" autocomplete="postal-code" inputmode="numeric" maxlength="5" placeholder="10451" required></label>
        </div>

        <div id="zipStatus" class="zip-status">Type an address for free suggestions, or enter ZIP to auto-fill city/state.</div>

        <label>Notes<textarea name="notes" placeholder="Apartment, delivery notes, etc."></textarea></label>

        <button class="primary-btn full" type="submit">Place Test Order</button>
      </form>

      <div id="orderMessage" class="order-message"></div>
    </section>

    <section class="summary-card">
      <p class="tag">Order Summary</p>
      <h2>Your Bag</h2>

      <div id="summaryItems"></div>

      <div class="cart-total">
        <span>Total</span>
        <strong id="summaryTotal">$0.00</strong>
      </div>

      <p class="note">This is a test checkout. Real payments need Stripe or another payment processor connected later.</p>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
